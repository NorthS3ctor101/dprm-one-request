<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <title>Admin Portal Login | DPRM-OneRequest</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="/js/config.js"></script>
  <script src="/js/login.js"></script>
</head>
<body class="bg-slate-50 font-sans antialiased h-screen w-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 md:p-8 space-y-6 shadow-xl shadow-slate-200/50">
    <div class="text-center space-y-2">
      <img src="/assets/logo.png" alt="DPRM Logo" class="w-20 h-auto mx-auto mb-2" />
      <h2 class="text-xl font-bold tracking-tight text-slate-800">
        DPRM On<span class="text-[#1d3557] italic">e</span>Request
      </h2>
      <p class="text-slate-400 text-xs font-semibold tracking-wide uppercase">Admin Authentication Gateway</p>
    </div>

    <div class="space-y-4">
      <div class="w-full">
        <input type="password" id="securityCode" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3.5 text-center text-lg font-bold tracking-widest text-slate-800 placeholder:font-normal placeholder:tracking-normal focus:outline-none focus:border-[#1d3557] focus:ring-2 focus:ring-[#1d3557]/10 transition-all placeholder-slate-400" placeholder="••••••••" />
      </div>
      
      <button id="submitLoginBtn" class="w-full bg-[#1d3557] hover:bg-[#11223b] text-white font-semibold py-3.5 px-4 rounded-xl transition-all text-sm tracking-wider uppercase cursor-pointer shadow-md hover:shadow-lg" onclick="login()">
        LOGIN
      </button>

      <div id="errorMessage" class="hidden text-red-600 bg-red-50 border border-red-200 rounded-xl p-3 text-xs font-medium text-center space-x-1">
        <i class="fas fa-circle-exclamation"></i>
        <span>Access Denied: Invalid security credentials</span>
      </div>
    </div>

    <div class="pt-4 border-t border-slate-100 text-center space-y-1 text-[11px] font-medium">
      <p class="text-[#1d3557] italic">
        Strictly Confidential: Access credentials must not be shared or distributed.
      </p>
      <p class="text-slate-400">
        &copy; 2026 Developed by DPRM ICT DevTeam
      </p>
    </div>
  </main>
</body>
</html>

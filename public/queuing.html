<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <title>DPRM-OneRequest | Live Queue Monitor</title>
  
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/css/style.css" />
  
  <script src="/js/config.js" defer></script>
  <script src="/js/queuing.js" defer></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased h-screen w-screen overflow-hidden flex flex-col justify-between p-6">

  <header class="bg-gradient-to-br from-[#0f1c3f] to-[#1d3557] border border-slate-200 rounded-2xl px-8 py-5 flex justify-between items-center shadow-lg shrink-0">
    <div class="flex items-center gap-6">
      <img src="/assets/logo.png" alt="DPRM Logo" class="h-16 w-auto drop-shadow-md" onerror="this.src='https://i.imgur.com/IM6VlDm.png'"/>
      <div>
        <h1 class="text-3xl font-black tracking-wider uppercase text-white">Document Request Queue</h1>
        <p class="text-sm text-slate-300 font-medium tracking-wide">Real-time Document Releasing Status</p>
      </div>
    </div>
    <div class="text-right flex flex-col items-end">
      <div id="liveClock" class="text-4xl font-mono font-black text-[#db7f0d] tracking-widest drop-shadow-xs">00:00:00 AM</div>
      <div id="liveDate" class="text-xs font-bold uppercase tracking-widest text-slate-300 mt-1">Wednesday, July 1, 2026</div>
    </div>
  </header>

  <main class="flex-grow my-5 bg-white border border-slate-200 rounded-3xl p-6 shadow-md flex flex-col overflow-hidden">
    <div class="w-full flex-grow flex flex-col overflow-hidden">
      <table class="w-full table-fixed flex flex-col h-full overflow-hidden">
        
        <thead class="w-full shrink-0">
          <tr class="flex text-left text-lg font-black text-slate-500 uppercase tracking-widest border-b border-slate-200 pb-4 px-6 bg-slate-50 rounded-xl">
            <th class="w-1/4">Reference Number</th>
            <th class="w-1/2">Document Requested</th>
            <th class="w-1/4 text-center">Status</th>
          </tr>
        </thead>

        <tbody id="queueBody" class="w-full flex-grow flex flex-col divide-y divide-slate-100 font-semibold text-2xl mt-2 overflow-hidden">
          <tr class="h-full flex items-center justify-center">
            <td class="text-center text-slate-400 py-12 text-xl flex items-center gap-4">
              <div class="animate-spin rounded-full h-8 w-8 border-4 border-[#1d3557] border-t-transparent"></div>
              Establishing secure real-time stream sync matrices...
            </td>
          </tr>
        </tbody>

      </table>
    </div>
  </main>

  <footer class="bg-white border border-slate-200 px-8 py-4 rounded-2xl flex justify-between items-center shadow-sm shrink-0">
    <div class="text-xs font-bold text-slate-400 tracking-wider">
      &copy; 2026 DPRM OneRequest. Developed by <span class="text-slate-600 font-extrabold">DPRM ICT DevTeam</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="inline-block h-2 w-2 rounded-full bg-emerald-600 animate-ping"></span>
      <span class="text-xs font-black tracking-widest uppercase text-emerald-600">Live System Monitor Connected</span>
    </div>
  </footer>

</body>
</html>
